name: next_nest_lms

x-resource-limits: &limits
  deploy:
    resources:
      limits:
        memory: 512M
      reservations:
        memory: 128M

services:
  lms_postgres:
    image: postgres
    container_name: lms_postgres
    network_mode: "host"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: lms
    ports:
      - "5432:5432"
    # networks:
    #   - app-network

    volumes:
      - lms_postgres_data:/var/lib/postgresql/data
    # restart: unless-stopped
    <<: *limits

  lms-minio-storage:
    image: quay.io/minio/minio
    # networks:
    #   - app-network
    network_mode: "host"

    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: user123
      MINIO_ROOT_PASSWORD: pass123123
    command: server /data --console-address ":9001"
    volumes:
      - lms-minio-volume:/data
    # restart: unless-stopped
    <<: *limits

