  lms-nginx:
    image: nginx:latest
    network_mode: "host"
    build:
      context: ./nginx
    container_name: lms-nginx
    # networks:
    #   - app-network
    ports:
      - "80:80"
    volumes:
      # - ./nginx/nginx.conf:/etc/nginx/nginx.conf
